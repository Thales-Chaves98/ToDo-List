<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles/main-style.css">
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    <link rel="stylesheet"href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
</head>
<body>
    <header>
        <button class="theme-btn" aria-label="Alternar tema">
            <span class="material-symbols-outlined">brightness_7</span>
        </button>
    </header>
    <main>
        <h1 class="form-title">Faça com Maestria !</h1>
        <section class="task-actions">
            <form class="task-form">
                <input type="text" id="input-task" placeholder="ADICIONE UMA TAREFA" autocomplete="off">
                <button id="add-btn" type="submit">SALVAR</button>
            </form>
        </section>
        <section id="task-list">
            <ul id="tasks-container">
                
            </ul>
        </section>
    </main>
    <footer>
        <P class="footer-text">To-Do List made by <a href="https://github.com/Thales-Chaves98">Thales Chaves</a></P>
    </footer>
    <div id="delete-modal" class="modal" hidden>
        <div class="modal-content">
            <h2>EXCLUIR TAREFA.</h2>
            <p>Tem certeza que deseja excluir esta tarefa ?</p>
            <p>Esta ação não poderá ser desfeita !</p>
            <div class="modal-actions">
                <button id="cancel-delete">Cancelar</button>
                <button id="confirm-delete">Excluir</button>
            </div>
        </div>
    </div>


    <script src="js/main-script.js"></script>
</body>
</html>
