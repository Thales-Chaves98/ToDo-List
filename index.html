<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles/main-style.css">
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
</head>
<body>
    <header>
        <!-- Minimalist dark/light mode icon-->
    </header>
    <main>
        <h1 class="form-title">Faça com Maestria !</h1>
        <section class="task-actions">
            <form class="task-form">
                <input type="text" id="input-task" placeholder="ADICIONE UMA TAREFA" autocomplete="off">
                <button id="add-btn" type="submit">SALVAR</button>
            </form>
        </section>
        <section id="task-list">
            <ul id="tasks-container">
                
            </ul>
        </section>
    </main>
    <footer>
        <!--Add footer later with a link to my GitHub-->
    </footer>
    <script src="js/main-script.js"></script>
</body>
</html>
